  <text x="40" y="440" fill="#444" font-family="system-ui,sans-serif" font-size="9">Grass-fed whey protein isolate, citric acid, natural flavor,</text>
  <text x="40" y="454" fill="#444" font-family="system-ui,sans-serif" font-size="9">stevia leaf extract, turmeric (color).</text>
